# electron-builder configuration for Vector Control Hub
# Reference: https://www.electron.build/configuration/configuration
#
# This is the PACKAGING SKELETON config (packaging/electron/).
# It uses the compiled electron-main.js from this directory as the entry point,
# replacing the desktop/main.mjs approach.
#
# To use the existing desktop/main.mjs entry point instead, see the root
# package.json `build` section.

appId: com.vectorcontrolhub.app
productName: Vector Control Hub

# Resolve paths from the repository root (two levels up from this file)
directories:
  app: ../..
  buildResources: ../../build-resources
  output: ../../dist-electron

files:
  - packaging/electron/electron-main.js
  - app/dist/**/*
  - server/dist/**/*
  - package.json

extraMetadata:
  main: packaging/electron/electron-main.js

asar: true

win:
  target:
    - nsis
    - portable
  # Code signing is NOT configured.
  # To enable signing, add these fields and set the corresponding secrets:
  #   certificateFile: ${env.WIN_CERT_FILE}
  #   certificatePassword: ${env.WIN_CERT_PASSWORD}
  signAndEditExecutable: false
  icon: build-resources/icons/vector-control-hub.ico

nsis:
  artifactName: "Vector-Control-Hub-Setup-${version}-${arch}.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vector Control Hub

portable:
  artifactName: "Vector-Control-Hub-Portable-${version}-${arch}.${ext}"
