name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  typecheck-and-test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck – app
        run: npm run typecheck --workspace app

      - name: Typecheck – server
        run: npm run typecheck --workspace server

      - name: Run server tests
        run: npm test --workspace server

      - name: Build app and server
        run: npm run build

  docker-build:
    name: Build Docker images (no push)
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: vector-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          tags: vector-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8787
            VITE_MOCK_MODE=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
