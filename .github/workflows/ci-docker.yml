name: Publish Docker Images

# Publishes server and frontend images to GitHub Container Registry (GHCR)
# when a version tag (v*.*.*) is pushed or a GitHub Release is published.
#
# Required: no additional secrets – the default GITHUB_TOKEN is sufficient
# for pushing to GHCR under the same repository owner.
#
# To use a custom token instead, set the GHCR_TOKEN repository secret and
# replace `secrets.GITHUB_TOKEN` below.

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  OWNER: p4nd4907

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME:-latest}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # ── Server image ──────────────────────────────────────────────────
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/vector-server:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/vector-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ────────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/vector-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/vector-frontend:latest
          build-args: |
            VITE_API_BASE_URL=http://localhost:8787
            VITE_MOCK_MODE=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
