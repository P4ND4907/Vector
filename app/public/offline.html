<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060816" />
    <title>Vector Control Hub Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(122, 248, 234, 0.18), transparent 28%),
          linear-gradient(180deg, #050814 0%, #08101d 100%);
        color: #f5fbff;
      }

      .panel {
        width: min(100%, 560px);
        border: 1px solid rgba(126, 166, 204, 0.2);
        background: rgba(10, 16, 29, 0.92);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #7af8ea;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.05;
      }

      p {
        margin: 14px 0 0;
        color: #aebfd2;
        line-height: 1.6;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a,
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .primary {
        background: #7af8ea;
        color: #061018;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.06);
        color: #f5fbff;
        border: 1px solid rgba(126, 166, 204, 0.2);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Offline</p>
      <h1>Vector Control Hub is waiting for a connection.</h1>
      <p>
        The app shell is installed and still opens, but it cannot reach the latest live files right now.
        Reconnect to the network and reload, or open the app again once your local backend is up.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">Try again</button>
        <a class="secondary" href="/#/">Open startup screen</a>
      </div>
    </main>
  </body>
</html>
